<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel DJ - Habbo CabraX FM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    background:#050b18;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
}

.contenedor{
    max-width:700px;
    margin:50px auto;
    padding:20px;
}

.bloque{
    background:#082040;
    border:1px solid #0e3a6d;
    border-radius:15px;
    padding:25px;
    text-align:center;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#e30613;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

#controlPanel{
    display:none;
}

</style>

</head>
<body>

<div class="contenedor">

<div class="bloque">

<h2>🔐 PANEL DJ</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Contraseña">

<br><br>

<button onclick="loginDJ()">ACCEDER</button>

<p id="mensaje"></p>

</div>

<div class="bloque" id="controlPanel">

<h2>🎙️ CONTROL DE EMISIÓN</h2>

<p id="usuarioConectado"></p>

<button onclick="ponerseEnDirecto()">
🔴 PONERME EN DIRECTO
</button>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
    "https://vktxipqgizwkcnuwwbrm.supabase.co",
    "sb_publishable_zskffegzDIf11N7qkGSdqg_WmUdGrde"
);

let nombreDJ = "";

async function loginDJ(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } =
    await supabase.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        document.getElementById("mensaje").innerHTML =
        "❌ Usuario o contraseña incorrectos";
        return;
    }

    nombreDJ = email.split("@")[0];

    document.getElementById("mensaje").innerHTML =
    "✅ Acceso correcto";

    document.getElementById("usuarioConectado").innerHTML =
    "Conectado como: " + nombreDJ;

    document.getElementById("controlPanel").style.display = "block";
}

async function ponerseEnDirecto(){

    const { error } = await supabase
    .from("emision")
    .update({
        dj_actual: nombreDJ,
        estado: "online"
    })
    .eq("id",1);

    if(error){

        alert("Error al actualizar");

        return;
    }

    alert("DJ puesto en directo");
}

</script>

</body>
</html>
