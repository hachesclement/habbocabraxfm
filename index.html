<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HabboCabrax FM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#04142a;
color:white;
}

.header{
width:100%;
}

.header img{
width:100%;
display:block;
}

.contenedor{
max-width:1400px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#082040;
border:1px solid #0e3a6d;
border-radius:15px;
padding:20px;
box-shadow:0 0 20px rgba(0,150,255,.2);
}

h2{
margin-bottom:15px;
color:#49b8ff;
}

iframe{
border:none;
width:100%;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div style="width:100%; text-align:center;">
    <img src="./ChatGPT Image 13 jul 2026, 14_48_09.png" 
         alt="Habbo Cabra XFM" 
         style="width:85%; max-width:1000px; height:auto;">
</div>

<div style="text-align:center; margin-top:30px;">
    <h2>🎧 Habbo Cabra XFM en directo</h2>

    <div data-type="podcastsPlayer"
         data-publicToken="b8bc4130-c5a6-4d87-9841-c2254d1bd665"
         data-theme="dark"
         data-color="EA0505"
         data-channelId="a23e4e3b-cead-4805-9d75-0dd9e0afe06a"
         class="cstrEmbed">
    </div>
</div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>
</div>

<div class="card">

<h2>💬 Chat en Vivo</h2>

<iframe
src="https://tlk.io/habbocabrax"
height="600">
</iframe>

</div>

</div>

</div>

</body>
</html>
