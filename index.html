<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habbo CabraX FM</title>
    <style>
        /* ESTILO GENERAL RETRO HABBO SÓLIDO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Volter, Verdana, Geneva, sans-serif; image-rendering: pixelated; }

        @font-face {
            font-family: 'Volter';
            src: url('https://fonts.cdnfonts.com/s/16231/Volter__28Goldfish_29.woff') format('woff');
        }

        body {
            background-color: #316c95; /* Azul oscuro corporativo Habbo */
            color: #000;
            padding: 40px 10px;
            font-size: 11px;
            min-height: 100vh;
        }

        .contenedor {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid #000;
            border-radius: 4px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
            overflow: hidden;
            background: #e3eff5; /* Ventana Habbo */
        }

        .banner { 
            background: #121212; 
            border-bottom: 2px solid #000; 
            text-align: center; 
        }
        .banner img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

        /* PESTAÑAS ESTILO INTERFAZ */
        .menu {
            background: #c3dbe7;
            padding: 8px 10px 0 10px;
            display: flex;
            gap: 4px;
            border-bottom: 2px solid #000;
        }

        .menu a {
            color: #2b2b2b; 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: bold;
            padding: 6px 14px; 
            background: #9fc1d4; 
            border-radius: 4px 4px 0 0;
            border: 2px solid #000; 
            border-bottom: none; 
            display: inline-block;
        }

        .menu a.active { 
            background: #e3eff5; 
            color: #000;
            position: relative;
            top: 2px;
            padding-bottom: 8px;
        }

        .panel { padding: 15px; }
        .zona-radio { display: flex; gap: 15px; }

        /* VISTAS DE BLOQUES */
        .bloque { 
            background: #ffffff; 
            border: 2px solid #000; 
            border-radius: 5px; 
            flex: 1; 
            overflow: hidden; 
            box-shadow: inset -2px -2px 0px #dedede;
        }
        .radio { flex: 1.4; }
        .dj { flex: 1; }

        .titulo {
            background: #739cb3;
            color: #fff;
            padding: 8px 12px; 
            border-bottom: 2px solid #000; 
            font-size: 11px; 
            font-weight: bold;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.5);
        }
        .radio .titulo { background: #b13d3d; }
        .dj .titulo { background: #628c3c; }

        .cuerpo { padding: 15px; }

        /* ========================================================
           CONSOLA CLÁSICA AMARILLA DE HABBO RECUPERADA
           ======================================================== */
        .consola-habbo {
            background: #f7d117; /* El amarillo clásico exacto */
            border: 3px solid #000;
            border-radius: 12px;
            padding: 16px;
            box-shadow: inset -4px -4px 0px #c2a106, inset 4px 4px 0px #ffe863, 0px 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        /* Pantalla interna gris oscuro */
        .consola-pantalla {
            background: #3a3d40;
            border: 3px solid #000;
            border-radius: 6px;
            padding: 10px;
            min-height: 80px;
            box-shadow: inset 2px 2px 0px #222;
            color: #fff;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .consola-header-info {
            border-bottom: 1px dashed #6b7278;
            padding-bottom: 4px;
            margin-bottom: 6px;
            color: #ffe600;
            font-weight: bold;
            text-transform: uppercase;
        }

        .consola-msg {
            color: #fff;
            line-height: 1.3;
        }

        /* Zona inferior de mandos / botones */
        .consola-controles {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e2be0f;
            padding: 8px;
            border: 2px solid #000;
            border-radius: 6px;
        }

        /* Botón de encendido/play estilo botón físico Habbo */
        .btn-consola-play {
            background: #628c3c;
            color: #fff;
            border: 2px solid #000;
            border-bottom: 4px solid #3d5924;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            padding: 6px 16px;
            cursor: pointer;
            text-shadow: 1px 1px 0px #000;
        }

        .btn-consola-play:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        .btn-consola-play.playing {
            background: #b13d3d;
            border-bottom-color: #732424;
        }

        /* Control de volumen integrado */
        .consola-volumen {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #000;
            font-weight: bold;
        }

        .consola-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 8px;
            background: #3a3d40;
            border: 2px solid #000;
            outline: none;
        }

        .consola-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 14px;
            background: #fff;
            border: 2px solid #000;
            cursor: pointer;
        }

        /* DETALLES DE TEXTO INTERNOS */
        .dj-info {
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
            background: #f7f9fa;
            border: 1px solid #b7c7d1;
            padding: 10px;
            border-radius: 4px;
        }

        .habbo-avatar {
            width: 40px;
            height: 40px;
            background: url('https://www.habbo.es/habbo-imaging/avatarimage?user=CabraX&direction=2&head_direction=2&gesture=sml&size=m') no-repeat center;
            background-size: contain;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 3px;
        }

        .footer { 
            background: #9fc1d4; 
            text-align: center; 
            padding: 10px; 
            font-size: 11px; 
            color: #2b2b2b; 
            border-top: 2px solid #000;
            font-weight: bold;
        }

        @media(max-width:768px){ .zona-radio { flex-direction: column; } }
    </style>
</head>

<body>

<div class="contenedor">
    <!-- BANNER -->
    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM" onerror="this.src='https://i.imgur.com/LNZT1vH.png';">
    </div>

    <!-- MENÚ -->
    <div class="menu">
        <a href="index.html" class="active">🏠 INICIO</a>
        <a href="panel.html">🎙 PANEL DJ</a>
    </div>

    <!-- CONTENIDO -->
    <div class="panel">
        <div class="zona-radio">
            
            <!-- REPRODUCTOR CON CONSOLA HABBO -->
            <div class="bloque radio">
                <div class="titulo">📻 TRANSMISIÓN</div>
                <div class="cuerpo">
                    
                    <!-- CONSOLA AMARILLA RETRO ORIGINAL -->
                    <div class="consola-habbo">
                        <div class="consola-pantalla">
                            <div>
                                <div class="consola-header-info">Habbo Consola v1.0</div>
                                <div class="consola-msg" id="stream-status">Tienes (1) mensaje nuevo: "Consola apagada. Pulsa ENCENDER para conectar."</div>
                            </div>
                        </div>
                        
                        <div class="consola-controles">
                            <!-- Botón verde original de encendido -->
                            <button class="btn-consola-play" id="playBtn" onclick="togglePlay()">ENCENDER</button>
                            
                            <!-- Control deslizante original -->
                            <div class="consola-volumen">
                                <span>Vol:</span>
                                <input type="range" class="consola-slider" id="volumeControl" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)">
                            </div>
                        </div>
                    </div>

                    <!-- ELEMENTO DE AUDIO LIMPIO -->
                    <audio id="habboAudio"></audio>

                </div>
            </div>

            <!-- DJ -->
            <div class="bloque dj">
                <div class="titulo">👤 DJ MANAGER</div>
                <div class="cuerpo">
                    <div class="dj-info">
                        <div class="habbo-avatar"></div>
                        <div>
                            <strong style="color: #000; font-size: 12px;">DJ CabraX</strong>
                            <p style="color: #666; margin-top: 2px;">● EMITIENDO EN VIVO</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer">Habbo CabraX FM © 2026 - Conectando píxeles.</div>
</div>

<script>
    var audio = document.getElementById('habboAudio');
    var playBtn = document.getElementById('playBtn');
    var statusText = document.getElementById('stream-status');
    audio.volume = 0.5;

    // Enlace directo de radio global (ZenoFM mp3 limpio), super compatible
 var urlRadio = "https://stream.zeno.fm/f37w1sn16v8uv";
    function togglePlay() {
        if (audio.paused) {
            // Ponemos la URL justo al pulsar para forzar al navegador a activarlo
            audio.src = urlRadio;
            
            var playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    playBtn.classList.add('playing');
                    playBtn.innerText = "APAGAR";
                    statusText.innerHTML = "<span style='color: #00ff00; font-weight: bold;'>● LIVE:</span> Conectado a CabraX FM. ¡Disfruta de la música!";
                }).catch(error => {
                    console.log("Error de reproducción:", error);
                    statusText.innerText = "Error al conectar. Por favor, haz clic otra vez.";
                });
            }
        } else {
            audio.pause();
            audio.src = ""; // Reseteamos la conexión al apagar
            playBtn.classList.remove('playing');
            playBtn.innerText = "ENCENDER";
            statusText.innerText = "Consola apagada. Pulsa ENCENDER para conectar.";
        }
    }

    function changeVolume(val) { 
        audio.volume = val; 
    }
</script>

</body>
</html>
