<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habbo CabraX FM</title>

<style>

body{
    margin:0;
    background:#0b172b;
    background-image:
    radial-gradient(circle at top,#1e355c 0%,#0b172b 60%);
    font-family:Verdana, Arial, sans-serif;
    color:white;
}

.contenedor{
    max-width:1100px;
    margin:auto;
}

/* BANNER */

.banner{
    margin-top:15px;
}

.banner img{
    width:100%;
    display:block;
    border-radius:8px;
    border:2px solid #274c7a;
}

/* MENU */

.menu{
    background:#183153;
    border:1px solid #274c7a;
    margin-top:8px;
    border-radius:6px;
    overflow:hidden;
}

.menu a{
    display:inline-block;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    font-size:13px;
    font-weight:bold;
}

.menu a:hover{
    background:#274c7a;
}

/* CONTENIDO */

.contenido{
    margin-top:15px;
}

.zona-radio{
    display:flex;
    gap:15px;
}

.caja{
    background:#132540;
    border:1px solid #274c7a;
    border-radius:6px;
    overflow:hidden;
}

.radio{
    flex:2;
}

.dj{
    flex:1;
}

.titulo{
    background:#1d3c67;
    padding:10px;
    font-size:14px;
    font-weight:bold;
    border-bottom:1px solid #274c7a;
}

.cuerpo{
    padding:15px;
}

.reproductor{
    max-width:450px;
    margin:auto;
}

.estado-online{
    color:#42ff42;
    font-weight:bold;
}

.info{
    margin:10px 0;
}

.info strong{
    display:block;
    color:#8fd4ff;
    margin-bottom:5px;
}

.footer{
    text-align:center;
    padding:20px;
    color:#8ca2c0;
    font-size:12px;
}

@media(max-width:800px){

.zona-radio{
    flex-direction:column;
}

}

</style>

</head>

<body>

<div class="contenedor">

    <!-- BANNER -->

    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM">
    </div>

    <!-- MENU -->

    <div class="menu">
        <a href="index.html">🏠 Inicio</a>
        <a href="panel.html">🎙️ Panel DJ</a>
    </div>

    <!-- CONTENIDO -->

    <div class="contenido">

        <div class="zona-radio">

            <!-- RADIO -->

            <div class="caja radio">

                <div class="titulo">
                    🔴 RADIO EN DIRECTO
                </div>

                <div class="cuerpo">

                    <div class="reproductor">

                        <div data-type="podcastsPlayer"
                        data-publicToken="b8bc4130-c5a6-4d87-9841-c2254d1bd665"
                        data-theme="dark"
                        data-color="EA0505"
                        data-channelId="a23e4e3b-cead-4805-9d75-0dd9e0afe06a"
                        class="cstrEmbed">

                            <a href="https://www.caster.fm">Shoutcast Hosting</a>
                            <a href="https://www.caster.fm">Stream Hosting</a>
                            <a href="https://www.caster.fm">Radio Server Hosting</a>

                        </div>

                    </div>

                </div>

            </div>

            <!-- DJ -->

            <div class="caja dj">

                <div class="titulo">
                    🎙️ DJ EN EMISIÓN
                </div>

                <div class="cuerpo">

                    <p class="estado-online">
                        🟢 RADIO ONLINE
                    </p>

                    <div class="info">
                        <strong>DJ actual</strong>
                        <span id="dj-actual">
                            Esperando DJ...
                        </span>
                    </div>

                    <div class="info">
                        <strong>Programa</strong>
                        <span id="programa-actual">
                            Habbo CabraX FM
                        </span>
                    </div>

                    <div class="info">
                        <strong>Estado</strong>
                        <span id="sesion-actual">
                            Radio online
                        </span>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">
        Habbo CabraX FM © 2026
    </div>

</div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
