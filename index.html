<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habbo CabraX FM</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:#081525;
    font-family:Verdana, Arial, sans-serif;
    color:#fff;
}

.contenedor{
    max-width:1000px;
    margin:0 auto;
}

/* BANNER */

.banner{
    border:2px solid #0b3f77;
    background:#04111f;
}

.banner img {
    width: 100%;
}

/* MENU */

.menu{
    background:linear-gradient(#0f4b8e,#093765);
    border-left:2px solid #0b3f77;
    border-right:2px solid #0b3f77;
    border-bottom:2px solid #0b3f77;
    text-align:center;
}

.menu a{
    display:inline-block;
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
    padding:12px 20px;
}

.menu a:hover{
    background:#15508f;
}

/* PANEL PRINCIPAL */

.panel{
    margin-top:10px;
    border:2px solid #0b3f77;
    background:#061a31;
    padding:10px;
}

.zona-radio{
    display:flex;
    gap:10px;
}

/* BLOQUES */

.bloque{
    background:#08203d;
    border:2px solid #0f4b8e;
}

.radio{
    width:55%;
}

.dj{
    width:40%;
}

/* TITULOS */

.titulo{
    background:#0d3f76;
    padding:12px;
    border-bottom:2px solid #0f4b8e;
    font-size:16px;
    font-weight:bold;
}

/* CONTENIDO */

.cuerpo{
    padding:15px;
}

/* DJ */

.estado-online{
    color:#58ff58;
    font-size:14px;
    font-weight:bold;
}

.dato{
    margin-bottom:15px;
}

.dato span{
    display:block;
    color:#ffd34f;
    font-size:13px;
    font-weight:bold;
    margin-bottom:4px;
}

.valor{
    font-size:16px;
}

/* FOOTER */

.footer{
    margin-top:10px;
    border:2px solid #0b3f77;
    background:#0d3f76;
    text-align:center;
    padding:12px;
    font-size:12px;
}

/* MOVIL */

@media(max-width:900px){

.zona-radio{
    flex-direction:column;
}

.radio,
.dj{
    width:100%;
}

}

</style>

</head>

<body>

<div class="contenedor">

    <!-- BANNER -->

    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM">
    </div>

    <!-- MENU -->

    <div class="menu">
        <a href="index.html">🏠 INICIO</a>
        <a href="panel.html">🎙 PANEL DJ</a>
    </div>

    <!-- CONTENIDO -->

    <div class="panel">

        <div class="zona-radio">

            <!-- RADIO -->

            <div class="bloque radio">

                <div class="titulo">
                    🔴 RADIO EN DIRECTO
                </div>

                <div class="cuerpo">

                    <div class="cstrEmbed">
    <div data-type="newStreamPlayer" data-publicToken="b8bc4130-c5a6-4d87-9841-c2254d1bd665" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false" class="cstrEmbed"><a href="https://www.caster.fm">Shoutcast Hosting</a> <a href="https://www.caster.fm">Stream Hosting</a> <a href="https://www.caster.fm">Radio Server Hosting</a></div><script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>
</div>
                    </div>

                </div>

            </div>

            <!-- DJ -->

            <div class="bloque dj">

                <div class="titulo">
                    🎙 DJ EN EMISIÓN
                </div>

                <div class="cuerpo">

                    <div class="dato">
                        <span>ESTADO</span>
                        <div class="estado-online">
                            🟢 RADIO ONLINE
                        </div>
                    </div>

                    <div class="dato">
                        <span>DJ ACTUAL</span>
                        <div id="dj-actual" class="valor">
                            Esperando DJ...
                        </div>
                    </div>

                    <div class="dato">
                        <span>PROGRAMA</span>
                        <div id="programa-actual" class="valor">
                            Habbo CabraX FM
                        </div>
                    </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">
        Habbo CabraX FM © 2026
    </div>

</div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
