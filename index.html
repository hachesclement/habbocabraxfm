<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habbo CabraX FM</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#081525;
    font-family:Verdana, Arial, sans-serif;
    color:white;
}

.contenedor{
    width:98%;
    max-width:1800px;
    margin:15px auto;
}

/* BANNER */

.banner{
    border:3px solid #0a3d72;
    background:#04101d;
}

.banner img{
    width:100%;
    display:block;
}

/* MENU */

.menu{
    background:linear-gradient(#0f4b8e,#093766);
    border-left:3px solid #0a3d72;
    border-right:3px solid #0a3d72;
    border-bottom:3px solid #0a3d72;
    text-align:center;
}

.menu a{
    display:inline-block;
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
    padding:14px 30px;
}

.menu a:hover{
    background:#134c88;
}

/* PANEL GENERAL */

.panel{
    margin-top:12px;
    border:3px solid #0a3d72;
    background:#041a33;
    padding:12px;
}

/* COLUMNAS */

.zona-radio{
    display:flex;
    gap:12px;
}

/* BLOQUES */

.bloque{
    background:#08213f;
    border:2px solid #0f4b8e;
}

.radio{
    width:45%;
}

.dj{
    width:55%;
}

/* TITULOS */

.titulo{
    background:#0d3f76;
    border-bottom:2px solid #0f4b8e;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

/* CUERPOS */

.cuerpo{
    padding:20px;
}

/* DJ */

.estado-online{
    color:#56ff56;
    font-weight:bold;
    font-size:22px;
}

.dato{
    margin-bottom:25px;
}

.dato span{
    display:block;
    color:#ffd64c;
    font-weight:bold;
    font-size:18px;
    margin-bottom:8px;
}

.valor{
    font-size:24px;
}

/* FOOTER */

.footer{
    margin-top:12px;
    background:#0d3f76;
    border:3px solid #0a3d72;
    text-align:center;
    padding:15px;
    font-size:14px;
}

/* MOVIL */

@media(max-width:1000px){

.zona-radio{
    flex-direction:column;
}

.radio,
.dj{
    width:100%;
}

}

</style>

</head>

<body>

<div class="contenedor">

    <!-- BANNER -->

    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM">
    </div>

    <!-- MENU -->

    <div class="menu">
        <a href="index.html">🏠 INICIO</a>
        <a href="panel.html">🎙 PANEL DJ</a>
    </div>

    <!-- CONTENIDO -->

    <div class="panel">

        <div class="zona-radio">

            <!-- RADIO -->

            <div class="bloque radio">

                <div class="titulo">
                    🔴 RADIO EN DIRECTO
                </div>

                <div class="cuerpo">

                    <div
                    data-type="podcastsPlayer"
                    data-publicToken="b8bc4130-c5a6-4d87-9841-c2254d1bd665"
                    data-theme="dark"
                    data-color="EA0505"
                    data-channelId="a23e4e3b-cead-4805-9d75-0dd9e0afe06a"
                    class="cstrEmbed">

                        <a href="https://www.caster.fm">Shoutcast Hosting</a>
                        <a href="https://www.caster.fm">Stream Hosting</a>
                        <a href="https://www.caster.fm">Radio Server Hosting</a>

                    </div>

                </div>

            </div>

            <!-- DJ -->

            <div class="bloque dj">

                <div class="titulo">
                    🎙 DJ EN EMISIÓN
                </div>

                <div class="cuerpo">

                    <div class="dato">
                        <span>ESTADO</span>
                        <div class="estado-online">
                            🟢 RADIO ONLINE
                        </div>
                    </div>

                    <div class="dato">
                        <span>DJ ACTUAL</span>
                        <div id="dj-actual" class="valor">
                            Esperando DJ...
                        </div>
                    </div>

                    <div class="dato">
                        <span>PROGRAMA</span>
                        <div id="programa-actual" class="valor">
                            Habbo CabraX FM
                        </div>
                    </div>

                    <div class="dato">
                        <span>SESIÓN</span>
                        <div id="sesion-actual" class="valor">
                            Radio online
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">
        Habbo CabraX FM © 2026
    </div>

</div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
