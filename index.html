<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habbo CabraX FM</title>

<style>

body{
    margin:0;
    background:#0b1528;
    font-family:Verdana, Arial, sans-serif;
    color:#fff;
}

.contenedor{
    max-width:1100px;
    margin:auto;
}

/* BANNER */

.banner{
    text-align:center;
    background:#06101f;
}

.banner img{
    width:100%;
    max-width:1100px;
    display:block;
    margin:auto;
}

/* MENU */

.menu{
    background:#1d3557;
    border-top:1px solid #3d5f91;
    border-bottom:1px solid #3d5f91;
    text-align:center;
}

.menu a{
    display:inline-block;
    padding:12px 20px;
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
}

.menu a:hover{
    background:#2f4f7f;
}

/* CONTENIDO */

.contenido{
    padding:15px;
}

.zona-principal{
    display:flex;
    gap:15px;
}

.caja{
    background:#13233f;
    border:1px solid #274c7a;
    border-radius:6px;
    padding:15px;
}

.radio{
    flex:2;
}

.dj{
    flex:1;
    text-align:center;
}

h2{
    margin-top:0;
    color:#7dc8ff;
    font-size:18px;
}

.reproductor{
    max-width:420px;
    margin:auto;
}

.estado{
    color:#4cff4c;
    font-weight:bold;
}

.footer{
    text-align:center;
    padding:20px;
    color:#8ca2c0;
    font-size:12px;
}

@media(max-width:800px){

.zona-principal{
    flex-direction:column;
}

}

</style>

</head>

<body>

<div class="contenedor">

    <div class="banner">
        <img src="./ChatGPT Image 13 jul 2026, 14_48_09.png" alt="Habbo CabraX FM">
    </div>

    <div class="menu">
        <a href="index.html">🏠 Inicio</a>
        <a href="panel.html">🎙️ Panel DJ</a>
    </div>

    <div class="contenido">

        <div class="zona-principal">

            <div class="caja radio">

                <h2>🔴 Radio en Directo</h2>

                <div class="reproductor">

                    <div data-type="podcastsPlayer"
                    data-publicToken="b8bc4130-c5a6-4d87-9841-c2254d1bd665"
                    data-theme="dark"
                    data-color="EA0505"
                    data-channelId="a23e4e3b-cead-4805-9d75-0dd9e0afe06a"
                    class="cstrEmbed">

                        <a href="https://www.caster.fm">Shoutcast Hosting</a>
                        <a href="https://www.caster.fm">Stream Hosting</a>
                        <a href="https://www.caster.fm">Radio Server Hosting</a>

                    </div>

                </div>

            </div>

            <div class="caja dj">

                <h2>🎙️ DJ en Emisión</h2>

                <p class="estado">🟢 RADIO ONLINE</p>

                <hr>

                <p><strong>DJ actual</strong></p>

                <h3 id="dj-actual">
                    Esperando DJ...
                </h3>

                <p><strong>Programa</strong></p>

                <p id="programa-actual">
                    Habbo CabraX FM
                </p>

                <p><strong>Estado</strong></p>

                <p id="sesion-actual">
                    Radio online
                </p>

            </div>

        </div>

    </div>

    <div class="footer">
        Habbo CabraX FM © 2026
    </div>

</div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
