<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web de Habbo</title>
    <style>
        /* Fondo difuminado con imagen clásica de Habbo */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            background: url('https://images.habbo.com/c_images/reception/reception_wildwildwest_background.png') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        /* Capa oscura y difuminada encima del fondo para que resalte la web */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); /* Oscurece el fondo */
            backdrop-filter: blur(8px); /* Difumina el fondo */
            z-index: 1;
        }

        /* Contenedor principal de la web */
        .main-container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(20, 20, 20, 0.85);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            width: 80%;
            max-width: 500px;
        }

        /* TÍTULO NEÓN: Brillo que cambia de color suavemente */
        h1 {
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 30px;
            animation: neonGlow 6s infinite alternate;
        }

        @keyframes neonGlow {
            0% {
                text-shadow: 0 0 5px #fff, 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00ff88;
            }
            50% {
                text-shadow: 0 0 5px #fff, 0 0 10px #00e1ff, 0 0 20px #00e1ff, 0 0 40px #00e1ff;
            }
            100% {
                text-shadow: 0 0 5px #fff, 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
            }
        }

        /* MENÚ CENTRADO Y LLAMATIVO */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 15px; /* Espacio entre botones */
            margin-top: 20px;
        }

        /* Estilo de los botones del menú */
        .nav-btn {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: 2px solid #00ff88;
            border-radius: 50px; /* Botones ovalados modernos */
            background: transparent;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 0 0 #00ff88;
        }

        /* Efecto al pasar el ratón por encima de los botones */
        .nav-btn:hover {
            color: #000;
            background: #00ff88;
            box-shadow: 0 0 15px #00ff88;
            transform: scale(1.05); /* Se hace un pelín más grande */
            cursor: pointer;
        }

        /* Un color diferente para el Panel DJ para que resalte más */
        .btn-dj {
            border-color: #ff007f;
        }
        .btn-dj:hover {
            background: #ff007f;
            box-shadow: 0 0 15px #ff007f;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Título con luces neón -->
        <h1>Bienvenidos</h1>
        
        <!-- Menú centrado y llamativo -->
        <div class="nav-menu">
            <a href="#" class="nav-btn">Inicio</a>
            <a href="#" class="nav-btn btn-dj">Panel DJ</a>
        </div>
    </div>

</body>
</html>
