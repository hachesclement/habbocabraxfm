<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habbo CabraX FM</title>
    <style>
        /* ESTILO GENERAL RETRO HABBO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000 url('https://images.habbo.com/c_images/reception/background_right_easter15.png') repeat;
            background-color: #2b2b2b;
            font-family: Verdana, Geneva, sans-serif;
            color: #fff;
            padding: 20px 10px;
        }

        .contenedor {
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0px 0px 0px 4px #111, 0px 0px 20px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
            background: #2e2e2e;
        }

        /* BANNER */
        .banner {
            background: #121212;
            border-bottom: 3px solid #1c1c1c;
            text-align: center;
        }

        .banner img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* MENU ESTILO HABBO TABS */
        .menu {
            background: #1e1e1e;
            border-bottom: 3px solid #41729F;
            padding: 10px 10px 0 10px;
            display: flex;
            gap: 5px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 16px;
            background: #41729F;
            border-radius: 6px 6px 0 0;
            border: 2px solid #111;
            border-bottom: none;
            text-shadow: 1px 1px 0px #22527a;
            display: inline-block;
        }

        .menu a:hover {
            background: #538cc6;
        }

        .menu a.active {
            background: #8cb83e;
            text-shadow: 1px 1px 0px #5c7e22;
        }

        /* CONTENIDO PRINCIPAL */
        .panel {
            padding: 15px;
            background: #3a3a3a;
        }

        .zona-radio {
            display: flex;
            gap: 15px;
        }

        /* BLOQUES ESTILO CAJAS HABBO */
        .bloque {
            background: #2b2b2b;
            border: 2px solid #111;
            border-radius: 5px;
            flex: 1;
            overflow: hidden;
        }

        .radio {
            flex: 1.4;
        }

        .dj {
            flex: 1;
        }

        /* TITULOS DE LAS CAJAS */
        .titulo {
            background: linear-gradient(to bottom, #4f4f4f, #333333);
            padding: 10px;
            border-bottom: 2px solid #111;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 1px #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio .titulo {
            background: linear-gradient(to bottom, #bd3f3f, #8a2525);
        }

        .dj .titulo {
            background: linear-gradient(to bottom, #4f964f, #2d662d);
        }

        .cuerpo {
            padding: 15px;
            text-align: center;
        }

        /* REPRODUCTOR NATIVO SEGURO */
        .player-habbo {
            background: #1e1e1e;
            border: 2px dashed #41729F;
            border-radius: 4px;
            padding: 20px 15px;
            text-align: center;
        }

        .player-status {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-habbo audio {
            width: 100%;
            outline: none;
        }

        /* ESTADO DJ */
        .estado-online {
            background: #47a047;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 3px;
            display: inline-block;
            border: 1px solid #2d662d;
            text-shadow: 1px 1px 0px #2d662d;
        }

        .dato {
            margin-bottom: 15px;
            border-bottom: 1px dashed #444;
            padding-bottom: 10px;
        }

        .dato:last-child {
            border: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .dato span {
            display: block;
            color: #f1b61c;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 1px 1px 0px #000;
        }

        .valor {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        /* FOOTER */
        .footer {
            background: #111;
            text-align: center;
            padding: 12px;
            font-size: 11px;
            color: #777;
            border-top: 2px solid #222;
        }

        /* RESPONSIVE */
        @media(max-width:768px){
            .zona-radio {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="contenedor">

    <!-- BANNER -->
    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM" onerror="this.src='https://i.imgur.com/LNZT1vH.png';">
    </div>

    <!-- MENU -->
    <div class="menu">
        <a href="index.html" class="active">🏠 INICIO</a>
        <a href="panel.html">🎙 PANEL DJ</a>
    </div>

    <!-- CONTENIDO -->
    <div class="panel">
        <div class="zona-radio">

            <!-- CAJA DE LA RADIO -->
            <div class="bloque radio">
                <div class="titulo">
                    📻 EN SINTONÍA
                </div>
                <div class="cuerpo">
                    
                    <div class="player-habbo">
                        <div class="player-status">Habbo CabraX FM Player</div>
                        
                        <!-- REPRODUCTOR HTML5 DIRECTO DESDE EL PUERTO SEGURO DE CASTER -->
                        <audio controls preload="none">
                            <source src="https://shoutcast.caster.fm:2199/tunein/a23e4e3b-cead-4805-9d75-0dd9e0afe06a.pls" type="audio/mpeg" id="source-caster">
                            Tu navegador no soporta el reproductor de audio.
                        </audio>
                    </div>

                </div>
            </div>

            <!-- CAJA DEL DJ -->
            <div class="bloque dj">
                <div class="titulo">
                    👤 DJ EN EMISIÓN
                </div>
                <div class="cuerpo">
                    <div class="dato">
                        <span>ESTADO</span>
                        <div class="estado-online">● EMITIENDO EN VIVO</div>
                    </div>

                    <div class="dato">
                        <span>DJ ACTUAL</span>
                        <div id="dj-actual" class="valor">Esperando DJ...</div>
                    </div>

                    <div class="dato">
                        <span>PROGRAMA</span>
                        <div id="programa-actual" class="valor">Habbo CabraX FM</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Habbo CabraX FM © 2026 - Conectando a la comunidad al estilo clásico.
    </div>

</div>

<script>
    // Forzamos la carga del stream directo en formato MP3 compatible con el widget
    document.getElementById('source-caster').src = "https://ssl.caster.fm:8443/listen.mp3?shaincast=a23e4e3b-cead-4805-9d75-0dd9e0afe06a";
</script>

</body>
</html>

</body>
</html>
