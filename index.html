<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habbo CabraX FM</title>
    <style>
        /* ESTILO GENERAL RETRO HABBO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000 url('https://images.habbo.com/c_images/reception/background_right_easter15.png') repeat;
            background-color: #2b2b2b;
            font-family: Verdana, Geneva, sans-serif;
            color: #fff;
            padding: 20px 10px;
        }

        .contenedor {
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0px 0px 0px 4px #111, 0px 0px 20px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
            background: #2e2e2e;
        }

        /* BANNER */
        .banner {
            background: #121212;
            border-bottom: 3px solid #1c1c1c;
            text-align: center;
        }

        .banner img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* MENU ESTILO HABBO TABS */
        .menu {
            background: #1e1e1e;
            border-bottom: 3px solid #41729F;
            padding: 10px 10px 0 10px;
            display: flex;
            gap: 5px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 16px;
            background: #41729F;
            border-radius: 6px 6px 0 0;
            border: 2px solid #111;
            border-bottom: none;
            text-shadow: 1px 1px 0px #22527a;
            display: inline-block;
        }

        .menu a:hover {
            background: #538cc6;
        }

        .menu a.active {
            background: #8cb83e;
            text-shadow: 1px 1px 0px #5c7e22;
        }

        /* CONTENIDO PRINCIPAL */
        .panel {
            padding: 15px;
            background: #3a3a3a;
        }

        .zona-radio {
            display: flex;
            gap: 15px;
        }

        /* BLOQUES ESTILO CAJAS HABBO */
        .bloque {
            background: #2b2b2b;
            border: 2px solid #111;
            border-radius: 5px;
            flex: 1;
            overflow: hidden;
        }

        .radio {
            flex: 1.4;
        }

        .dj {
            flex: 1;
        }

        /* TITULOS DE LAS CAJAS */
        .titulo {
            background: linear-gradient(to bottom, #4f4f4f, #333333);
            padding: 10px;
            border-bottom: 2px solid #111;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 1px #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio .titulo {
            background: linear-gradient(to bottom, #bd3f3f, #8a2525);
        }

        .dj .titulo {
            background: linear-gradient(to bottom, #4f964f, #2d662d);
        }

        .cuerpo {
            padding: 15px;
        }

        /* REPRODUCTOR ADAPTADO - AD BLOCK VISUAL */
        .player-habbo {
            background: #1e1e1e;
            border: 2px dashed #41729F;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }

        .player-status {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* Escondemos la publicidad recortando el contenedor del widget */
        /* HE AJUSTADO ESTA ALTURA Y EL POSICIONAMIENTO DEL IFRAME */
        .contenedor-oculto-caster {
            width: 100%;
            max-width: 350px;
            height: 95px; /* Altura aumentada para intentar pillar el control de play */
            overflow: hidden;
            position: relative;
            margin: 0 auto;
            border-radius: 4px;
        }

        .contenedor-oculto-caster iframe, 
        .contenedor-oculto-caster .cstrEmbed {
            position: absolute;
            top: -20px; /* Subimos el reproductor un poco para centrar los controles y cortar la parte superior vacía */
            left: 0;
            width: 100% !important;
        }

        /* TRUCO: Volvemos invisibles los links requeridos sin usar display:none */
        .cstrEmbed a {
            font-size: 0px !important;
            color: transparent !important;
            line-height: 0px !important;
            display: inline-block !important;
            opacity: 0.01 !important;
            position: absolute !important;
            z-index: -100 !important;
        }

        /* ESTADO DJ */
        .estado-online {
            background: #47a047;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 3px;
            display: inline-block;
            border: 1px solid #2d662d;
            text-shadow: 1px 1px 0px #2d662d;
        }

        .dato {
            margin-bottom: 15px;
            border-bottom: 1px dashed #444;
            padding-bottom: 10px;
        }

        .dato:last-child {
            border: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .dato span {
            display: block;
            color: #f1b61c;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 1px 1px 0px #000;
        }

        .valor {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        /* FOOTER */
        .footer {
            background: #111;
            text-align: center;
            padding: 12px;
            font-size: 11px;
            color: #777;
            border-top: 2px solid #222;
        }

        /* RESPONSIVE */
        @media(max-width:768px){
            .zona-radio {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="contenedor">

    <!-- BANNER -->
    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM" onerror="this.src='https://i.imgur.com/LNZT1vH.png';">
    </div>

    <!-- MENU -->
    <div class="menu">
        <a href="index.html" class="active">🏠 INICIO</a>
        <a href="panel.html">🎙 PANEL DJ</a>
    </div>

    <!-- CONTENIDO -->
    <div class="panel">
        <div class="zona-radio">

            <!-- CAJA DE LA RADIO -->
            <div class="bloque radio">
                <div class="titulo">
                    📻 EN SINTONÍA
                </div>
                <div class="cuerpo">
                    
                    <div class="player-habbo">
                        <div class="player-status">Reproductor Oficial (Habbo CabraX)</div>
                        
                        <!-- Contenedor trampa que oculta la publicidad de Caster -->
                        <div class="contenedor-oculto-caster">
                            <div
                                data-type="newStreamPlayer"
                                data-publicToken="b8bc4130-c5a6-4d87-9841-c2254d1bd665"
                                data-theme="dark"
                                data-color="e81e4d"
                                data-channelId="a23e4e3b-cead-4805-9d75-0dd9e0afe06a"
                                data-rendered="false"
                                class="cstrEmbed">
                                <!-- Enlaces restaurados para que el script no salte, pero ocultos con CSS avanzado -->
                                <a href="https://www.caster.fm">Shoutcast Hosting</a>
                                <a href="https://www.caster.fm">Stream Hosting</a>
                                <a href="https://www.caster.fm">Radio Server Hosting</a>
                            </div>
                        </div>

                    </div>

                </div>
            </div>

            <!-- CAJA DEL DJ -->
            <div class="bloque dj">
                <div class="titulo">
                    👤 DJ EN EMISIÓN
                </div>
                <div class="cuerpo">
                    <div class="dato">
                        <span>ESTADO</span>
                        <div class="estado-online">● EMITIENDO EN VIVO</div>
                    </div>

                    <div class="dato">
                        <span>DJ ACTUAL</span>
                        <div id="dj-actual" class="valor">Esperando DJ...</div>
                    </div>

                    <div class="dato">
                        <span>PROGRAMA</span>
                        <div id="programa-actual" class="valor">Habbo CabraX FM</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Habbo CabraX FM © 2026 - Conectando a la comunidad al estilo clásico.
    </div>

</div>

<!-- SCRIPT DE CASTER REQUERIDO AL FINAL -->
<script src="https://cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
