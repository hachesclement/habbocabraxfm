<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habbo CabraX FM</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#081527;
    font-family:Verdana, Arial, sans-serif;
    color:#ffffff;
}

/* CONTENEDOR GENERAL */

.contenedor{
    width:100%;
    max-width:1200px;
    margin:auto;
    padding:10px;
}

/* BANNER */

.banner{
    border:3px solid #0d2f57;
    background:#06111f;
}

.banner img{
    width:100%;
    display:block;
}

/* MENU */

.menu{
    background:#0b2f5a;
    border-left:3px solid #0d2f57;
    border-right:3px solid #0d2f57;
    border-bottom:3px solid #0d2f57;
    text-align:center;
}

.menu a{
    display:inline-block;
    color:white;
    text-decoration:none;
    padding:14px 25px;
    font-weight:bold;
    font-size:14px;
}

.menu a:hover{
    background:#17457d;
}

/* PANEL PRINCIPAL */

.panel{
    margin-top:12px;
    border:3px solid #0d2f57;
    background:#081b34;
    padding:12px;
}

/* DOS COLUMNAS */

.zona{
    display:flex;
    gap:12px;
}

/* CAJAS */

.caja{
    background:#0a2240;
    border:2px solid #123f70;
}

.radio{
    flex:1.3;
}

.dj{
    flex:1;
}

/* TITULOS */

.titulo{
    background:#0d3463;
    border-bottom:2px solid #123f70;
    padding:12px;
    font-size:15px;
    font-weight:bold;
    color:#ffffff;
}

/* CONTENIDO */

.cuerpo{
    padding:15px;
}

/* RADIO */

.reproductor{
    max-width:500px;
    margin:auto;
}

/* DJ */

.estado-online{
    color:#49ff49;
    font-weight:bold;
}

.dato{
    margin-bottom:18px;
}

.dato span{
    display:block;
    color:#7fc8ff;
    margin-bottom:5px;
    font-weight:bold;
}

.valor{
    color:white;
}

/* FOOTER */

.footer{
    margin-top:12px;
    text-align:center;
    background:#0b2f5a;
    border:3px solid #0d2f57;
    padding:15px;
    font-size:12px;
}

/* MOVIL */

@media(max-width:900px){

.zona{
    flex-direction:column;
}

}

</style>

</head>

<body>

<div class="contenedor">

    <!-- BANNER -->

    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM">
    </div>

    <!-- MENU -->

    <div class="menu">
        <a href="index.html">🏠 INICIO</a>
        <a href="panel.html">🎙️ PANEL DJ</a>
    </div>

    <!-- PANEL PRINCIPAL -->

    <div class="panel">

        <div class="zona">

            <!-- RADIO -->

            <div class="caja radio">

                <div class="titulo">
                    🔴 RADIO EN DIRECTO
                </div>

                <div class="cuerpo">

                    <div class="reproductor">

                        <div
                        data-type="podcastsPlayer"
                        data-publicToken="b8bc4130-c5a6-4d87-9841-c2254d1bd665"
                        data-theme="dark"
                        data-color="EA0505"
                        data-channelId="a23e4e3b-cead-4805-9d75-0dd9e0afe06a"
                        class="cstrEmbed">

                        <a href="https://www.caster.fm">Shoutcast Hosting</a>
                        <a href="https://www.caster.fm">Stream Hosting</a>
                        <a href="https://www.caster.fm">Radio Server Hosting</a>

                        </div>

                    </div>

                </div>

            </div>

            <!-- DJ -->

            <div class="caja dj">

                <div class="titulo">
                    🎙️ DJ EN EMISIÓN
                </div>

                <div class="cuerpo">

                    <div class="dato">
                        <span>Estado</span>
                        <div class="estado-online">
                            🟢 RADIO ONLINE
                        </div>
                    </div>

                    <div class="dato">
                        <span>DJ Actual</span>
                        <div id="dj-actual" class="valor">
                            Esperando DJ...
                        </div>
                    </div>

                    <div class="dato">
                        <span>Programa</span>
                        <div id="programa-actual" class="valor">
                            Habbo CabraX FM
                        </div>
                    </div>

                    <div class="dato">
                        <span>Sesión</span>
                        <div id="sesion-actual" class="valor">
                            Radio online
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">
        Habbo CabraX FM © 2026
    </div>

</div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
