<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabboCabrax FM</title>

<style>
body{
    margin:0;
    background:#071524;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#0b1b2f;
    padding:20px;
    border-bottom:3px solid #1f8fff;
}

.logo{
    font-size:34px;
    font-weight:bold;
    color:#ffb900;
}

.logo span{
    color:#3aa7ff;
}

.banner{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(180deg,#123e70,#081726);
}

.banner h1{
    font-size:60px;
    margin:0;
}

.banner p{
    font-size:22px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:15px 30px;
    background:#1f8fff;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}

.card{
    background:#10233b;
    padding:20px;
    border-radius:12px;
}

footer{
    text-align:center;
    padding:20px;
    background:#08131f;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>

</head>
<body>

<header>
<div class="logo">Habbo<span>Cabrax</span> FM</div>
</header>

<section class="banner">
<h1>HABBOCABRAX FM</h1>
<p>La radio de Habbo Hotel</p>
<a href="#" class="btn">▶ ESCUCHAR AHORA</a>
</section>

<div class="container">

<div class="card">
<h2>📻 Radio en directo</h2>
<p>DJ: </p>
<p>Estado: ONLINE</p>
</div>

<div class="card">
<h2>💬 Chat</h2>
<p>Próximamente...</p>
</div>

</div>

<footer>
© HabboCabrax FM
</footer>

</body>
</html>
