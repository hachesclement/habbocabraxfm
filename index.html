<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habbo CabraX FM</title>
    <style>
        /* ESTILO GENERAL RETRO HABBO */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000 url('https://images.habbo.com/c_images/reception/background_right_easter15.png') repeat;
            background-color: #2b2b2b;
            font-family: Verdana, Geneva, sans-serif;
            color: #fff;
            padding: 20px 10px;
        }

        .contenedor {
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0px 0px 0px 4px #111, 0px 0px 20px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
            background: #2e2e2e;
        }

        .banner { background: #121212; border-bottom: 3px solid #1c1c1c; text-align: center; }
        .banner img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

        .menu {
            background: #1e1e1e;
            border-bottom: 3px solid #41729F;
            padding: 10px 10px 0 10px;
            display: flex;
            gap: 5px;
        }

        .menu a {
            color: white; text-decoration: none; font-size: 12px; font-weight: bold;
            padding: 8px 16px; background: #41729F; border-radius: 6px 6px 0 0;
            border: 2px solid #111; border-bottom: none; display: inline-block;
        }

        .menu a.active { background: #8cb83e; }

        .panel { padding: 15px; background: #3a3a3a; }
        .zona-radio { display: flex; gap: 15px; }

        .bloque { background: #2b2b2b; border: 2px solid #111; border-radius: 5px; flex: 1; overflow: hidden; }
        .radio { flex: 1.4; }
        .dj { flex: 1; }

        .titulo {
            background: linear-gradient(to bottom, #4f4f4f, #333333);
            padding: 10px; border-bottom: 2px solid #111; font-size: 13px; font-weight: bold;
        }
        .radio .titulo { background: linear-gradient(to bottom, #bd3f3f, #8a2525); }
        .dj .titulo { background: linear-gradient(to bottom, #4f964f, #2d662d); }

        .cuerpo { padding: 15px; text-align: center; }

        /* REPRODUCTOR ESTABLE */
        .player-habbo {
            background: #1e1e1e;
            border: 2px dashed #41729F;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }

        .player-status { font-size: 11px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; }

        .footer { background: #111; text-align: center; padding: 12px; font-size: 11px; color: #777; }

        @media(max-width:768px){ .zona-radio { flex-direction: column; } }
    </style>
</head>

<body>

<div class="contenedor">
    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM" onerror="this.src='https://i.imgur.com/LNZT1vH.png';">
    </div>

    <div class="menu">
        <a href="index.html" class="active">🏠 INICIO</a>
        <a href="panel.html">🎙 PANEL DJ</a>
    </div>

    <div class="panel">
        <div class="zona-radio">
            <div class="bloque radio">
                <div class="titulo">📻 EN SINTONÍA</div>
                <div class="cuerpo">
                    <div class="player-habbo">
                        <div class="player-status">Habbo CabraX FM Player</div>
                        
                        <!-- REPRODUCTOR ESTABLE INTEGRADO -->
                        <iframe src="https://caster.fm/widgets/new-stream-player.php?publicToken=b8bc4130-c5a6-4d87-9841-c2254d1bd665&theme=light&color=e81e4d" 
                                width="100%" 
                                height="150" 
                                frameborder="0" 
                                scrolling="no">
                        </iframe>
                        
                    </div>
                </div>
            </div>

            <div class="bloque dj">
                <div class="titulo">👤 DJ EN EMISIÓN</div>
                <div class="cuerpo">
                    <p style="font-size: 12px; color: #fff;">● EMITIENDO EN VIVO</p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">Habbo CabraX FM © 2026</div>
</div>

</body>
</html>
