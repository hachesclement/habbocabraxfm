<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Habbo CabraX FM</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#06111f;
    font-family:Verdana, Arial, sans-serif;
    color:#fff;
}

.contenedor{
    width:98%;
    max-width:1880px;
    margin:15px auto;
}

/* BANNER */

.banner{
    border:4px solid #08396d;
    background:#03101d;
}

.banner img{
    width:100%;
    display:block;
}

/* MENU */

.menu{
    background:linear-gradient(#0f4b8e,#08386b);
    border-left:4px solid #08396d;
    border-right:4px solid #08396d;
    border-bottom:4px solid #08396d;
    text-align:center;
    padding:14px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:22px;
    margin:0 35px;
}

/* PANEL GENERAL */

.panel{
    margin-top:12px;
    border:4px solid #08396d;
    background:#041a33;
    padding:12px;
}

/* COLUMNAS */

.zona-radio{
    display:flex;
    gap:18px;
}

.radio{
    width:43%;
}

.dj{
    width:57%;
}

/* CAJAS */

.bloque{
    border:3px solid #0d4b8f;
    background:linear-gradient(to right,#06192f,#07264a);
}

.titulo{
    padding:18px;
    font-size:34px;
    font-weight:bold;
    border-bottom:2px solid #0d4b8f;
}

/* CUERPOS */

.cuerpo{
    padding:20px;
}

/* PLAYER FAKE */

.player-box{
    margin-top:20px;
    border:3px solid #173d66;
    background:#020d1b;
    padding:20px;
    display:flex;
    align-items:center;
}

.play{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#1d2b3c;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    margin-right:25px;
}

.radio-name{
    color:#ff443a;
    font-size:36px;
    font-weight:bold;
}

.radio-live{
    color:#6cff39;
    font-size:30px;
    font-weight:bold;
}

/* DJ */

.dj-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
}

.dj-box{
    border-left:1px solid #0d4b8f;
    padding:20px;
    min-height:180px;
}

.dj-box:first-child{
    border-left:none;
}

.dj-titulo{
    color:#ffd33a;
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.dj-valor{
    font-size:24px;
}

/* FOOTER */

.footer{
    margin-top:12px;
    border:4px solid #08396d;
    background:#0a2e5a;
    text-align:center;
    padding:18px;
    font-size:22px;
}

/* MOVIL */

@media(max-width:1100px){

.zona-radio{
    flex-direction:column;
}

.radio,
.dj{
    width:100%;
}

.dj-grid{
    grid-template-columns:1fr;
}

.dj-box{
    border-left:none;
    border-top:1px solid #0d4b8f;
}

}

</style>

</head>

<body>

<div class="contenedor">

    <!-- BANNER -->

    <div class="banner">
        <img src="banner.png" alt="Habbo CabraX FM">
    </div>

    <!-- MENU -->

    <div class="menu">
        <a href="index.html">🏠 INICIO</a>
        <a href="panel.html">🎙️ PANEL DJ</a>
    </div>

    <!-- PANEL PRINCIPAL -->

    <div class="panel">

        <div class="zona">

            <!-- RADIO -->

            <div class="caja radio">

                <div class="titulo">
                    🔴 RADIO EN DIRECTO
                </div>

                <div class="cuerpo">

                    <div class="reproductor">

                        <div
                        data-type="podcastsPlayer"
                        data-publicToken="b8bc4130-c5a6-4d87-9841-c2254d1bd665"
                        data-theme="dark"
                        data-color="EA0505"
                        data-channelId="a23e4e3b-cead-4805-9d75-0dd9e0afe06a"
                        class="cstrEmbed">

                        <a href="https://www.caster.fm">Shoutcast Hosting</a>
                        <a href="https://www.caster.fm">Stream Hosting</a>
                        <a href="https://www.caster.fm">Radio Server Hosting</a>

                        </div>

                    </div>

                </div>

            </div>

            <!-- DJ -->

            <div class="caja dj">

                <div class="titulo">
                    🎙️ DJ EN EMISIÓN
                </div>

                <div class="cuerpo">

                    <div class="dato">
                        <span>Estado</span>
                        <div class="estado-online">
                            🟢 RADIO ONLINE
                        </div>
                    </div>

                    <div class="dato">
                        <span>DJ Actual</span>
                        <div id="dj-actual" class="valor">
                            Esperando DJ...
                        </div>
                    </div>

                    <div class="dato">
                        <span>Programa</span>
                        <div id="programa-actual" class="valor">
                            Habbo CabraX FM
                        </div>
                    </div>

                    <div class="dato">
                        <span>Sesión</span>
                        <div id="sesion-actual" class="valor">
                            Radio online
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">
        Habbo CabraX FM © 2026
    </div>

</div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
